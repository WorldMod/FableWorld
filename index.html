<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FableWorld Store</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; margin: 10px; display: inline-block; width: 250px; border: 1px solid #333; }
        .btn { background: #ff9800; border: none; padding: 10px; color: white; border-radius: 5px; cursor: pointer; width: 100%; }
        .hidden { display: none; }
        input { padding: 10px; margin: 5px; width: 80%; background: #333; color: white; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>⚔️ FableWorld Shop</h1>
    <div id="auth">
        <input type="text" id="nick" placeholder="Ник в Minecraft">
        <button class="btn" onclick="login()">Войти</button>
    </div>
    <div id="main" class="hidden">
        <p>Игрок: <b id="u-nick"></b> | Баланс: <b id="u-bal"></b> Fables</p>
        <div class="box">
            <h3>Кейс Fables</h3><p>5.00 Fables</p>
            <button class="btn" onclick="buy('case_donate', 5)">Купить</button>
        </div>
        <div id="admin" class="hidden" style="border: 1px solid red; padding: 10px; margin-top: 20px;">
            <h3>Админ-панель</h3>
            <input type="text" id="adm-cmd" placeholder="Команда сервера">
            <button class="btn" onclick="sendCmd()">Выполнить</button>
        </div>
    </div>
    <script>
        const API = '/api';
        const ADMIN = 'WorldMod';
        function login() {
            const nick = document.getElementById('nick').value;
            fetch(API+'/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nickname:nick}) })
            .then(r=>r.json()).then(u=>{ localStorage.setItem('user', JSON.stringify(u)); location.reload(); });
        }
        function update() {
            const u = JSON.parse(localStorage.getItem('user'));
            if(u) {
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('u-nick').innerText = u.nickname;
                document.getElementById('u-bal').innerText = u.balance;
                if(u.nickname === ADMIN) document.getElementById('admin').classList.remove('hidden');
            }
        }
        function buy(id, p) {
            const u = JSON.parse(localStorage.getItem('user'));
            fetch(API+'/buy', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nickname:u.nickname, rankId:id, price:p}) })
            .then(r=>r.json()).then(d=>{ if(d.error) alert(d.error); else location.reload(); });
        }
        function sendCmd() {
            const u = JSON.parse(localStorage.getItem('user'));
            const c = document.getElementById('adm-cmd').value;
            fetch(API+'/admin/command', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({nickname:u.nickname, command:c}) })
            .then(r=>r.json()).then(d=>alert(d.response));
        }
        update();
    </script>
</body>
</html>

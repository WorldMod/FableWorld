<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FableWorld | Магазин</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; margin: 10px; border-radius: 10px; display: inline-block; width: 200px; }
        .btn { background: #ff9800; border: none; padding: 10px 20px; cursor: pointer; color: white; border-radius: 5px; }
        .hidden { display: none !important; }
        #terminal { background: black; color: #0f0; text-align: left; padding: 10px; height: 200px; overflow-y: scroll; margin-top: 10px; }
        input { padding: 10px; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>FableWorld Store</h1>

    <div id="auth-section">
        <input type="text" id="nick-input" placeholder="Ваш ник в Minecraft">
        <button class="btn" onclick="login()">Войти</button>
    </div>

    <div id="user-section" class="hidden">
        <p>Привет, <span id="user-nick"></span>! Баланс: <span id="user-balance">0</span> Fables</p>
        <input type="text" id="promo-input" placeholder="Промокод">
        <button class="btn" onclick="usePromo()">ОК</button>
        <button class="btn" style="background:red" onclick="logout()">Выйти</button>
    </div>

    <div id="shop">
        <div class="card">
            <h3>Кейс "С донатом"</h3>
            <p>Цена: 5.00$</p>
            <button class="btn" onclick="buy('case_donate', 5)">Купить</button>
        </div>
        <div class="card">
            <h3>Разбан</h3>
            <p>Цена: 10.00$</p>
            <button class="btn" onclick="buy('unban', 10)">Купить</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden" style="border: 2px solid red; margin-top: 50px; padding: 20px;">
        <h2>Админ-панель (Только для WorldMod)</h2>
        <input type="text" id="target-nick" placeholder="Ник игрока">
        <input type="number" id="add-amount" placeholder="Сумма">
        <button class="btn" onclick="addMoney()">Начислить Fables</button>
        
        <br><br>
        <input type="text" id="new-promo" placeholder="Код">
        <input type="number" id="promo-reward" placeholder="Награда">
        <button class="btn" onclick="createPromo()">Создать промо</button>

        <h3>Терминал сервера</h3>
        <div id="terminal"></div>
        <input type="text" id="cmd-input" style="width:80%" placeholder="Введите команду...">
        <button class="btn" onclick="sendConsole()">Выполнить</button>
    </div>
</div>

<script>
    const API = 'https://fableworld.onrender.com/api';
    const ADMIN_NICKNAME = 'WorldMod'; // КТО ВИДИТ АДМИНКУ

    function login() {
        const nick = document.getElementById('nick-input').value;
        if(!nick) return;
        fetch(`${API}/auth`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nickname: nick })
        })
        .then(res => res.json())
        .then(user => {
            localStorage.setItem('user', JSON.stringify(user));
            updateUI();
        });
    }

    function updateUI() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('user-section').classList.remove('hidden');
            document.getElementById('user-nick').textContent = user.nickname;
            document.getElementById('user-balance').textContent = user.balance;

            // Проверка на админа
            if (user.nickname === ADMIN_NICKNAME) {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }
    }

    function buy(id, price) {
        const user = JSON.parse(localStorage.getItem('user'));
        fetch(`${API}/buy`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nickname: user.nickname, rankId: id, price: price })
        })
        .then(res => res.json())
        .then(data => {
            if(data.error) alert(data.error);
            else {
                alert('Покупка прошла!');
                user.balance = data.balance;
                localStorage.setItem('user', JSON.stringify(user));
                updateUI();
            }
        });
    }

    function sendConsole() {
        const user = JSON.parse(localStorage.getItem('user'));
        const cmd = document.getElementById('cmd-input').value;
        fetch(`${API}/admin/command`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nickname: user.nickname, command: cmd })
        })
        .then(res => res.json())
        .then(data => {
            const term = document.getElementById('terminal');
            term.innerHTML += `> ${cmd}<br><span style="color:white">${data.response || data.error}</span><br>`;
            term.scrollTop = term.scrollHeight;
        });
    }

    function addMoney() {
        const user = JSON.parse(localStorage.getItem('user'));
        const target = document.getElementById('target-nick').value;
        const amount = document.getElementById('add-amount').value;
        fetch(`${API}/admin/add-money`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminNick: user.nickname, targetNick: target, amount })
        }).then(() => alert('Готово'));
    }

    function createPromo() {
        const user = JSON.parse(localStorage.getItem('user'));
        const code = document.getElementById('new-promo').value;
        const reward = document.getElementById('promo-reward').value;
        fetch(`${API}/admin/create-promo`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ adminNick: user.nickname, code, reward })
        }).then(() => alert('Промокод создан'));
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    updateUI();
</script>
</body>
</html>
